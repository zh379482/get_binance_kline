name: 🛠️ Binance Data Clean Pipeline

on:
  workflow_dispatch: # 支持手动点击运行
  
  workflow_run:
    workflows: ["Binance Data Sync Pipeline"] # 联动触发
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  offline-clean-task:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    permissions:
      contents: write # 必须赋予写权限，否则无法推入仓库

    steps:
    - name: 1. 检出仓库代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 🛡️ 深度克隆，拉取完整历史树，防 Git 提交死锁

    - name: 2. 安装 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 3. 安装量化特征计算依赖
      run: pip install pandas pyarrow numpy

    - name: 4. 纯本地就地清洗并衍生量化特征
      run: python clean_local_data.py

    - name: 5. 分批调优并永久同步至 GitHub 仓库
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 🚀【网络流调优】：把 Git 的 HTTP 推送缓冲区疯狂撑大到 1GB，关闭压缩，防止大批量 Parquet 推送卡死
        git config --global http.postBuffer 1048576000
        git config --global http.maxRequestBuffer 1048576000
        git config --global core.compression 0
        
        # 精确锁定清洗特征文件夹
        git add cleaned_data/
        
        if git diff --staged --quiet; then
          echo "⚡ 盘点完毕：特征库已经是最新状态，无须更新。"
        else
          git commit -m "🤖 自动特征工程：永久同步增量量化特征层"
          
          echo "🚀 开始强力推流至 GitHub 仓库..."
          for i in {1..3}; do
            git push origin HEAD:${{ github.ref }} && exit 0 || echo "⚠️ 提示：第 $i 次推流断开，正在尝试重试..."
            sleep 5
          done
          exit 1
        fi
