name: Binance Local Data Clean

on:
  workflow_dispatch: # 手动触发
  workflow_run:
    workflows: ["Binance Data Sync"] # 联动触发
    types:
      - completed

# 🛡️ 显式声明：强制给予这个工作流对仓库代码的读写权限，双重保险防 128 错误
permissions:
  contents: write

env:
  # 🧼 顺应 2026 官方新规：强行启用 Node 24 引擎，完美消灭 Deprecated 警告！
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  clean:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 干净无缓存设置

    - name: Install Dependencies
      run: |
        pip install pandas numpy pyarrow

    - name: Run Local Clean Script
      run: python clean_local_data.py

    - name: Commit and Push Cleaned Data
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add cleaned_parquet_data/
        if git diff --cached --quiet; then
          echo "No new cleaned data to commit."
        else
          git commit -m "🤖 自动特征工程：清洗增量数据"
          git push
        fi
