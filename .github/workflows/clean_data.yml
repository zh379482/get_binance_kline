name: Binance Local Data Clean

on:
  workflow_dispatch: # 允许你手动点击按钮触发
  workflow_run:
    workflows: ["Binance Data Sync"]
    types:
      - completed

jobs:
  clean:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        pip install pandas numpy pyarrow

    - name: Run Local Clean Script
      run: python clean_local_data.py

    - name: Commit and Push Cleaned Data
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add cleaned_parquet_data/
        if git diff --cached --quiet; then
          echo "No new cleaned data to commit."
        else
          git commit -m "清洗数据"
          git push
        fi
