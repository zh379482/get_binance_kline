name: Binance Data Sync Pipeline

on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    
    # 显式声明读写权限
    permissions:
      contents: write

    steps:
    - name: 1. 检出仓库代码
      uses: actions/checkout@v4
      with:
        # 使用内置 Token 初始化仓库凭证
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 2. 初始化 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 3. 安装数据工程依赖
      run: pip install pandas pyarrow requests tqdm

    - name: 4. 执行全币种日K下载与转换
      run: python "$GITHUB_WORKSPACE/get_binance_kline.py"

    - name: 5. 注入 Token 强制推送（彻底粉碎 code 128）
      env:
        # 将内置 Token 转换为环境变量
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add binance_parquet_data/
        
        if git diff --staged --quiet; then
          echo "没有检测到任何新生成的 Parquet 文件，无需推送。"
        else
          git commit -m "🤖 自动同步: 2026年币安日K线归档"
          
          # 核心修改：重新组装带 Token 的远程仓库 URL，让 Git 无法拒绝
          # 格式: https://x-access-token:TOKEN@github.com/用户名/仓库名.git
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          
          # 强制将远程地址重置为带有最高权限的 URL
          git remote set-url origin "$REMOTE_URL"
          
          # 先拉取防止冲突，再强力推送
          git pull --rebase origin HEAD
          git push origin HEAD
        fi
