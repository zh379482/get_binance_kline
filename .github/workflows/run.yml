name: Binance Data Sync Pipeline

on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    # 🌟 核心：直接在最顶层明明白白地告诉 GitHub 允许这个脚本改写仓库
    permissions:
      contents: write  # 显式声明：云端电脑拥有对仓库的写入权限
      contents: write

    steps:
    - name: 1. 检出仓库代码
      uses: actions/checkout@v4

    - name: 2. 安装 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 3. 安装工具包
      run: pip install pandas pyarrow requests tqdm

    - name: 4. 启动云端加速通道
      run: |
        echo "http_proxy=http://112.217.151.10:8080" >> $GITHUB_ENV
        echo "https_proxy=http://112.217.151.10:8080" >> $GITHUB_ENV

    - name: 5. 让 Python 开始下载和洗数据
    - name: 4. 执行免代理清洗脚本
      run: python "$GITHUB_WORKSPACE/get_binance_kline.py"

    - name: 6. ✨ 核心：免密直接存入 GitHub 仓库
    - name: 5. 强行存入 GitHub 仓库
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 把新生成的 binance_parquet_data 文件夹塞进暂存区
        git add binance_parquet_data/
        
        # 检查是否有新文件，有的话就直接存进去
        if git diff --staged --quiet; then
          echo "没有新文件，无需更新。"
        else
          git commit -m "🤖 自动归档: 2025-2026年币安日K线Parquet数据"
          git commit -m "🤖 自动同步: 币安历史数据"
          git push origin HEAD:${{ github.ref }}
        fi
