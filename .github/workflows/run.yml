name: Binance Data Sync Pipeline

on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
    - name: 1. 检出仓库代码
      uses: actions/checkout@v4

    - name: 2. 初始化 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 3. 安装数据工程依赖
      run: pip install pandas pyarrow requests tqdm

    - name: 4. 执行全币种日K下载与转换
      run: python "$GITHUB_WORKSPACE/get_binance_kline.py"

    - name: 5. 🌟 将 Parquet 数据作为产物上传（不走 Git，100% 成功）
      uses: actions/upload-artifact@v4
      with:
        # 你下载的数据包名字
        name: binance-parquet-daily-data
        # 对应 Python 脚本里生成的文件夹路径
        path: binance_parquet_data/
        # 压缩率（1-9），9 为最高压缩
        compression-level: 9
        # 数据在 GitHub 服务器上保存的天数（默认 90 天）
        retention-days: 7
