name: Binance Data Sync Pipeline

on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: 1. 检出仓库代码
      uses: actions/checkout@v4

    - name: 2. 安装 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 3. 安装工具包
      run: pip install pandas pyarrow requests tqdm

    - name: 4. 执行免代理清洗脚本
      run: python "$GITHUB_WORKSPACE/get_binance_kline.py"

    - name: 5. 强行存入 GitHub 仓库
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 仅仅把原始行情文件夹加入暂存区
        git add binance_parquet_data/
        
        if git diff --staged --quiet; then
          echo "没有新文件，无需更新。"
        else
          git commit -m "自动同步: 币安历史数据"
          git push origin HEAD:${{ github.ref }}
        fi
